name: tap2remind
description: Ultra-simple reminder app
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  shared_preferences: ^2.1.1
  cupertino_icons: ^1.0.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.0.1
  intl: ^0.18.1
  google_fonts: ^6.2.1
  chrono_dart: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
